<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Shop — ounce</title>
  <meta name="description" content="The full ounce catalogue. Heavyweight essentials measured in grams.">
  <meta name="theme-color" content="#E9E7E1">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body data-page="shop">
  <main class="page">
    <div class="wrap">
      <header class="shop-head">
        <h1>Shop<span style="color:var(--signal)">.</span></h1>
        <div class="shop-head__meta">
          <p class="mono" style="color:var(--ash)"><span data-shop-count>00</span> pieces · one capsule · restocked by mass</p>
          <p style="margin-top:8px">Every price is what it costs to make it well. Every piece lists its weight.</p>
        </div>
      </header>
    </div>

    <div class="wrap">
      <div class="filters" data-filters></div>
      <div class="grid" data-shop-grid style="margin-top:1px"></div>
    </div>

    <div class="wrap" style="margin-top:1px">
      <div class="marquee">
        <div class="marquee__track">
          <span>FREE SHIPPING OVER <span class="oz">£200</span></span>
          <span>30-DAY RETURNS</span>
          <span>MADE IN SMALL RUNS</span>
          <span>MEASURED IN <span class="oz">GRAMS</span></span>
          <span>SHIPPED FROM LISBON</span>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/products.js"></script>
  <script src="/assets/js/store.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/shop.js"></script>
</body>
</html>
