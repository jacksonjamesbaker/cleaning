# OUNCE — Netlify deploy config
# Static site + one serverless function for Stripe checkout.

[build]
  publish = "."
  functions = "netlify/functions"

# The storefront calls /api/checkout — map it to the function.
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
