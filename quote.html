<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Get a Quote — SparkleClean</title>
  <meta name="description" content="Get your free, no-obligation cleaning quote in under a minute. Tell us about your space and we'll be in touch within one working hour.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0fb5a6">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Simplified header on the conversion page: brand + the same single CTA
       (kept visible for consistency; it links to the top of this form). -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="SparkleClean home">
        <svg viewBox="0 0 32 32" aria-hidden="true"><rect x="1" y="1" width="30" height="30" rx="9" fill="#0fb5a6"/><path fill="#fff" d="M16 6.5l1.9 4.9 4.9 1.9-4.9 1.9L16 20.1l-1.9-4.9L9.2 13.3l4.9-1.9L16 6.5z"/><circle cx="23.5" cy="8.5" r="1.9" fill="#fff" opacity="0.9"/></svg>
        <span>Sparkle<b>Clean</b></span>
      </a>
      <a class="btn btn--primary btn--sm" href="quote.html">Get a Quote</a>
    </div>
  </header>

  <main id="main" class="quote-wrap">
    <div class="container">
      <div class="quote-shell">

        <!-- Progress bar -->
        <div class="progress" aria-hidden="false">
          <div class="progress-meta">
            <span id="progress-label">Step 1 of 6</span>
            <span>Free &amp; no obligation</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" role="progressbar" aria-label="Quote progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="16"></div>
          </div>
        </div>

        <!-- Step card -->
        <div class="step-card">
          <!-- Steps are rendered here by js/quote.js -->
          <div id="quote-steps" aria-live="polite"></div>

          <!-- Back button (shared across steps; hidden on the first step) -->
          <div class="step-nav" style="margin-top:20px;">
            <button type="button" class="btn-back" id="quote-back" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              Back
            </button>
            <span></span>
          </div>
        </div>

        <!-- Reassurance / trust strip beneath the form -->
        <div class="quote-trust">
          <span class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Fully insured</span>
          <span class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg> DBS-checked cleaners</span>
          <span class="trust-item"><span class="stars" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg></span> Rated 4.9/5 by 2,000+ customers</span>
        </div>

      </div>
    </div>
  </main>

  <script src="js/main.js" defer></script>
  <script src="js/quote.js" defer></script>
</body>
</html>
